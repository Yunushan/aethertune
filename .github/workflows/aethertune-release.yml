name: aethertune-release-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  provenance:
    name: Release dependency provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter and Dart
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Resolve client dependencies
        run: cd apps/mobile && flutter pub get

      - name: Resolve server dependencies
        run: cd services/server && dart pub get

      - name: Generate release SBOMs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/provenance
          (cd apps/mobile && flutter pub deps --json > ../../release/provenance/aethertune-mobile-dependencies.json)
          (cd services/server && dart pub deps --json > ../../release/provenance/aethertune-server-dependencies.json)
          python3 scripts/ci/generate_dart_sbom.py --deps-json release/provenance/aethertune-mobile-dependencies.json --component-name aethertune-mobile --output release/provenance/aethertune-mobile.cdx.json
          python3 scripts/ci/generate_dart_sbom.py --deps-json release/provenance/aethertune-server-dependencies.json --component-name aethertune-server --output release/provenance/aethertune-server.cdx.json
          python3 scripts/ci/generate_dart_sbom.py --deps-json release/provenance/aethertune-mobile-dependencies.json --component-name aethertune-mobile --output release/provenance/aethertune-mobile.cdx.json --check
          python3 scripts/ci/generate_dart_sbom.py --deps-json release/provenance/aethertune-server-dependencies.json --component-name aethertune-server --output release/provenance/aethertune-server.cdx.json --check

      - name: Upload release dependency provenance
        uses: actions/upload-artifact@v7
        with:
          name: aethertune-dependency-provenance
          if-no-files-found: error
          path: release/provenance/

  android:
    name: Android release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Generate platform wrappers
        run: bash ./scripts/bootstrap_client.sh

      - name: Build APK
        run: cd apps/mobile && flutter build apk --release

      - name: Build app bundle
        run: cd apps/mobile && flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aethertune-android
          if-no-files-found: error
          path: |
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
            apps/mobile/build/app/outputs/bundle/release/app-release.aab

  desktop:
    name: Desktop release artifact (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact_name: aethertune-linux-x64
          - os: windows-latest
            target: windows
            artifact_name: aethertune-windows-x64
          - os: macos-latest
            target: macos
            artifact_name: aethertune-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libasound2-dev libayatana-appindicator3-dev libgtk-3-dev libkeybinder-3.0-dev liblzma-dev libmpv-dev libsecret-1-0 libsecret-1-dev ninja-build pkg-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Verify Windows SMTC toolchain
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          rustup --version
          cargo --version

      - name: Generate platform wrappers
        run: bash ./scripts/bootstrap_client.sh

      - name: Build desktop app
        run: cd apps/mobile && flutter build ${{ matrix.target }} --release

      - name: Package Linux desktop app
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          tar -czf release/aethertune-linux-x64.tar.gz -C apps/mobile/build/linux/x64/release/bundle .
          version="$(awk '/^version:/ {print $2}' apps/mobile/pubspec.yaml | cut -d+ -f1)"
          bash scripts/ci/package_linux_deb.sh apps/mobile/build/linux/x64/release/bundle release/aethertune-linux-x64.deb "$version"

      - name: Package macOS desktop app
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          app_bundle="$(find apps/mobile/build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -type d | head -n 1)"
          bash scripts/ci/package_macos_zip.sh "$app_bundle" release/aethertune-macos.zip

      - name: Package Windows desktop app
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          ./scripts/ci/package_windows_zip.ps1 -BundlePath apps/mobile/build/windows/x64/runner/Release -OutputPath release/aethertune-windows-x64.zip

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: release/*

  server:
    name: Server executable (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            binary_name: aethertune-server-linux-x64
          - os: windows-latest
            label: windows-x64
            binary_name: aethertune-server-windows-x64.exe
          - os: macos-latest
            label: macos
            binary_name: aethertune-server-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: stable

      - name: Install server dependencies
        run: cd services/server && dart pub get

      - name: Compile server executable
        shell: bash
        run: |
          set -euo pipefail
          cd services/server
          mkdir -p build
          dart compile exe bin/server.dart -o "build/${{ matrix.binary_name }}"

      - name: Upload server executable
        uses: actions/upload-artifact@v7
        with:
          name: aethertune-server-${{ matrix.label }}
          if-no-files-found: error
          path: services/server/build/${{ matrix.binary_name }}

  assemble-release:
    name: Assemble verified release bundle
    needs: [provenance, android, desktop, server]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: aethertune-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum -- * > SHA256SUMS.txt

      - name: Upload verified release bundle
        uses: actions/upload-artifact@v7
        with:
          name: aethertune-release-bundle
          if-no-files-found: error
          path: release/*

  publish:
    name: Publish GitHub release
    needs: [assemble-release]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified release bundle
        uses: actions/download-artifact@v8
        with:
          name: aethertune-release-bundle
          path: release

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release/* --title "AetherTune $RELEASE_TAG" --generate-notes --repo "$GITHUB_REPOSITORY"
          fi
