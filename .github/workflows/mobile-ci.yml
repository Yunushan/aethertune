name: mobile-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Generate platform wrappers
        run: bash ./scripts/bootstrap_mobile.sh

      - name: Analyze
        run: cd apps/mobile && flutter analyze

      - name: Test
        run: cd apps/mobile && flutter test
