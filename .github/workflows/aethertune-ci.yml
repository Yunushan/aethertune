name: aethertune-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  provenance:
    name: Dependency provenance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter and Dart
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Test SBOM generator
        run: python3 scripts/ci/test_generate_dart_sbom.py

      - name: Test release manifest generator
        run: python3 scripts/ci/test_generate_release_manifest.py

      - name: Test release manifest verifier
        run: python3 scripts/ci/test_verify_release_manifest.py

      - name: Test Node 24 action pins
        run: python3 scripts/ci/test_actions_node24_contract.py

      - name: Test Android release artifact verifier
        run: python3 scripts/ci/test_verify_android_release_artifacts.py

      - name: Test release workflow contract
        run: python3 scripts/ci/test_release_workflow.py

      - name: Test provider contract workflow
        run: python3 scripts/ci/test_provider_contract_workflow.py

      - name: Test privacy and network audit
        run: python3 scripts/ci/test_privacy_network_audit.py

      - name: Resolve client dependencies
        run: cd apps/mobile && flutter pub get

      - name: Resolve server dependencies
        run: cd services/server && dart pub get

      - name: Capture resolved dependency graphs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/provenance
          (cd apps/mobile && flutter pub deps --json > ../../build/provenance/aethertune-mobile-dependencies.json)
          (cd services/server && dart pub deps --json > ../../build/provenance/aethertune-server-dependencies.json)

      - name: Generate reproducible SBOMs
        run: |
          python3 scripts/ci/generate_dart_sbom.py --deps-json build/provenance/aethertune-mobile-dependencies.json --component-name aethertune-mobile --output build/provenance/aethertune-mobile.cdx.json
          python3 scripts/ci/generate_dart_sbom.py --deps-json build/provenance/aethertune-server-dependencies.json --component-name aethertune-server --output build/provenance/aethertune-server.cdx.json
          python3 scripts/ci/generate_dart_sbom.py --deps-json build/provenance/aethertune-mobile-dependencies.json --component-name aethertune-mobile --output build/provenance/aethertune-mobile.cdx.json --check
          python3 scripts/ci/generate_dart_sbom.py --deps-json build/provenance/aethertune-server-dependencies.json --component-name aethertune-server --output build/provenance/aethertune-server.cdx.json --check

      - name: Upload dependency provenance
        uses: actions/upload-artifact@v7
        with:
          name: aethertune-dependency-provenance
          if-no-files-found: error
          path: build/provenance/

  flutter:
    name: Flutter analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Verify generated platform wrappers
        run: python3 scripts/test_configure_audio_service_platforms.py

      - name: Generate platform wrappers
        run: bash ./scripts/bootstrap_client.sh

      - name: Analyze
        run: |
          cd apps/mobile
          bash ../../scripts/ci/flutter_analyze_with_annotations.sh

      - name: Test
        run: cd apps/mobile && flutter test

      - name: Provider contract - Core source model
        run: cd apps/mobile && flutter test test/music_source_provider_test.dart test/provider_search_test.dart test/provider_home_feed_test.dart

      - name: Provider contract - Local Library
        run: cd apps/mobile && flutter test test/local_library_provider_test.dart test/provider_binary_loader_test.dart

      - name: Provider contract - Podcast RSS
        run: cd apps/mobile && flutter test test/itunes_podcast_directory_test.dart test/podcast_rss_provider_test.dart test/podcast_subscription_refresh_worker_test.dart

      - name: Provider contract - Radio Browser
        run: cd apps/mobile && flutter test test/radio_browser_provider_test.dart test/radio_browser_station_screen_test.dart

      - name: Provider contract - Internet Archive
        run: cd apps/mobile && flutter test test/internet_archive_provider_test.dart test/internet_archive_item_screen_test.dart test/internet_archive_collection_screen_test.dart

      - name: Provider contract - Audius
        run: cd apps/mobile && flutter test test/audius_provider_test.dart

      - name: Provider contract - Jamendo
        run: cd apps/mobile && flutter test test/jamendo_provider_test.dart test/jamendo_settings_store_test.dart

      - name: Provider contract - Custom Catalog
        run: cd apps/mobile && flutter test test/custom_catalog_provider_test.dart

      - name: Provider contract - Spotify metadata
        run: cd apps/mobile && flutter test test/spotify_metadata_provider_test.dart test/spotify_oauth_client_test.dart test/spotify_oauth_flow_test.dart

      - name: Provider contract - YouTube Data and account metadata
        run: cd apps/mobile && flutter test test/youtube_data_metadata_provider_test.dart test/youtube_music_chart_screen_test.dart test/youtube_public_playlists_screen_test.dart test/youtube_followed_channel_feed_screen_test.dart test/youtube_account_provider_test.dart test/youtube_oauth_client_test.dart test/youtube_oauth_flow_test.dart test/youtube_account_settings_store_test.dart test/youtube_account_library_screen_test.dart

      - name: Provider contract - Jellyfin
        run: cd apps/mobile && flutter test test/jellyfin_provider_test.dart

      - name: Provider contract - Navidrome and Subsonic
        run: cd apps/mobile && flutter test test/subsonic_provider_test.dart

      - name: Provider contract - LRCLIB lyrics
        run: cd apps/mobile && flutter test test/lrclib_lyrics_provider_test.dart

      - name: Build Android debug app
        run: cd apps/mobile && flutter build apk --debug

  desktop:
    name: Desktop build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libasound2-dev libayatana-appindicator3-dev libgtk-3-dev libkeybinder-3.0-dev liblzma-dev libmpv-dev libsecret-1-0 libsecret-1-dev ninja-build pkg-config

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Enable desktop target
        run: flutter config --enable-${{ matrix.target }}-desktop

      - name: Verify Windows SMTC toolchain
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          rustup --version
          cargo --version

      - name: Generate platform wrappers
        run: bash ./scripts/bootstrap_client.sh

      - name: Build desktop app
        run: cd apps/mobile && flutter build ${{ matrix.target }} --debug

      - name: Test Linux release packaging
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/ci/test_package_linux_tarball.sh
          bash ./scripts/ci/test_package_linux_deb.sh
          bash ./scripts/ci/package_linux_tarball.sh apps/mobile/build/linux/x64/debug/bundle build/aethertune-linux-x64-debug.tar.gz

      - name: Test Windows ZIP packaging
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          ./scripts/ci/test_package_windows_zip.ps1
          ./scripts/ci/test_package_windows_msix.ps1

      - name: Test macOS release packaging
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/ci/test_package_macos_zip.sh
          bash ./scripts/ci/test_package_macos_dmg.sh
          app_bundle="$(find apps/mobile/build/macos/Build/Products/Debug -maxdepth 1 -name '*.app' -type d | head -n 1)"
          bash ./scripts/ci/package_macos_zip.sh "$app_bundle" build/aethertune-macos-debug.zip
          bash ./scripts/ci/package_macos_dmg.sh "$app_bundle" build/aethertune-macos-debug.dmg

      - name: Build and package unsigned iOS app
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          (cd apps/mobile && flutter build ios --debug --no-codesign)
          bash ./scripts/ci/test_package_ios_unsigned_zip.sh
          app_bundle="$(find apps/mobile/build/ios/iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          bash ./scripts/ci/package_ios_unsigned_zip.sh "$app_bundle" build/aethertune-ios-unsigned-debug.zip

  server:
    name: Server analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: stable

      - name: Install server dependencies
        run: cd services/server && dart pub get

      - name: Analyze server
        run: cd services/server && dart analyze

      - name: Test server
        run: cd services/server && dart test

      - name: Compile server executable
        run: cd services/server && mkdir -p build && dart compile exe bin/server.dart -o build/aethertune-server

      - name: Smoke test server executable
        run: dart scripts/ci/test_server_executable.dart services/server/build/aethertune-server
