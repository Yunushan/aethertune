services:
  aethertune-server:
    build: .
    ports:
      - "${AETHERTUNE_BIND_ADDRESS:-127.0.0.1}:${AETHERTUNE_PORT:-8080}:8080"
    environment:
      PORT: 8080
      AETHERTUNE_DATA_DIR: /data
      AETHERTUNE_SYNC_USERS: "${AETHERTUNE_SYNC_USERS:?Set AETHERTUNE_SYNC_USERS in .env}"
      AETHERTUNE_OPS_TOKEN: "${AETHERTUNE_OPS_TOKEN:?Set AETHERTUNE_OPS_TOKEN in .env}"
    volumes:
      - aethertune-server-data:/data
    restart: unless-stopped

volumes:
  aethertune-server-data:
