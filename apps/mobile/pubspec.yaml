name: aethertune
description: Free and open-source music app with local playback and provider plugins.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.42
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_windows_audio: ^1.0.9
  audio_session: ^0.1.21
  file_picker: ^8.1.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  path: ^1.9.0
  collection: ^1.18.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
