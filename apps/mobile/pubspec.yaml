name: aethertune
description: Free and open-source music app with local playback and provider plugins.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audio_service: ^0.18.19
  audio_service_mpris: ^0.2.1
  just_audio: ^0.9.42
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_windows_audio: ^1.0.9
  audio_session: ^0.1.25
  file_picker: 12.0.0-beta.7
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  collection: ^1.18.0
  crypto: ^3.0.7
  xml: ^6.5.0
  share_plus: ^13.2.0
  dynamic_color: ^1.8.1
  hotkey_manager: ^0.2.3
  tray_manager: ^0.5.3
  window_manager: ^0.5.2
  app_links: ^7.2.1
  smtc_windows: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
