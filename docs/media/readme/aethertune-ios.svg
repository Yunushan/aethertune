  <rect x="78" y="360" width="264" height="122" rx="22" fill="#111827"/>
  <text x="102" y="394" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#94a3b8">00:18  floating through the open air</text>
  <text x="102" y="426" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#67e8f9">00:24  aether tunes the signal</text>
  <text x="102" y="458" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#94a3b8">00:31  every source stays clear</text>
  <text x="78" y="524" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Privacy-first sources</text>
