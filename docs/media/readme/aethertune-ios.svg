  <text x="100" y="598" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" fill="#15803d">Declared domains</text>
  <rect x="218" y="544" width="124" height="76" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
