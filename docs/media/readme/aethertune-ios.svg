<svg width="420" height="760" viewBox="0 0 420 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AetherTune iOS preview</title>
  <desc id="desc">iOS phone preview showing playlists, lyrics, history, and privacy-first source adapters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#312e81"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf5ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="420" height="760" rx="34" fill="url(#bg)"/>
  <rect x="42" y="28" width="336" height="704" rx="50" fill="#111827" filter="url(#shadow)"/>
  <rect x="58" y="48" width="304" height="664" rx="38" fill="#f9fafb"/>
  <rect x="160" y="60" width="100" height="24" rx="12" fill="#111827"/>
