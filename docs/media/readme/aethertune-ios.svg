  <text x="78" y="144" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b">Manual, smart, queue-saved</text>
  <rect x="78" y="170" width="264" height="130" rx="24" fill="url(#card)" stroke="#ddd6fe"/>
  <circle cx="118" cy="215" r="24" fill="#8b5cf6"/>
  <path d="M108 215h20M118 205v20" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <text x="158" y="207" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937">Favorites</text>
  <text x="158" y="230" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">Smart playlist from your library</text>
  <rect x="96" y="260" width="204" height="8" rx="4" fill="#ddd6fe"/>
